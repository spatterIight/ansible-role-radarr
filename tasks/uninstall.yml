---
- name: Check existence of Radarr systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ radarr_identifier }}.service"
  register: radarr_service_stat

- name: Uninstall Radarr systemd services and files
  when: radarr_service_stat.stat.exists | bool
  block:
    - name: Ensure Radarr systemd service is stopped
      ansible.builtin.service:
        name: "{{ radarr_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Radarr systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ radarr_identifier }}.service"
        state: absent

    - name: Ensure Radarr support files do not exist
      ansible.builtin.file:
        path: "{{ radarr_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Radarr local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ radarr_data_path }}"
      register: radarr_data_path_deletion_result
      changed_when: radarr_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Radarr base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ radarr_base_path }}"
      register: radarr_base_path_deletion_result
      changed_when: radarr_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Radarr container network does not exist
      when: radarr_container_network_deletion_enabled
      block:
        - name: Ensure Radarr container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ radarr_container_network }}"
            state: absent
          register: radarr_network_deletion_result

        - name: Ensure Radarr container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ radarr_container_network }}
          register: radarr_network_deletion_result
          changed_when: radarr_container_network in radarr_network_deletion_result.stdout

- name: Check existence of Radarr local data path
  ansible.builtin.stat:
    path: "{{ radarr_data_path }}"
  register: radarr_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining Radarr local data path
  when: radarr_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Radarr instance has been removed, some old data remains in `" + radarr_data_path + "`. Feel free to delete it."
        ]
      }}

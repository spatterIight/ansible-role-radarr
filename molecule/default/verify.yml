---
- name: Verify Radarr systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Radarr service to become active (up to 180s)
      ansible.builtin.systemd:
        name: radarr.service
      register: radarr_service
      until: radarr_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Radarr service is active
      ansible.builtin.assert:
        that: radarr_service.status.ActiveState == 'active'
        fail_msg: "radarr.service not active ({{ radarr_service.status.ActiveState }})"
        success_msg: "radarr.service is active"

    - name: Retrieve Radarr service log for debugging
      when: radarr_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu radarr.service
      changed_when: false

    - name: Wait for Radarr HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:7878/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: radarr_endpoint
      until: radarr_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Radarr HTTP endpoint responds
      ansible.builtin.assert:
        that: radarr_endpoint.status in [200, 302]
        fail_msg: "Radarr did not respond as expected ({{ radarr_endpoint.status | default('no response') }})"
        success_msg: "Radarr responded with {{ radarr_endpoint.status }}"

    - name: Show Radarr systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Radarr systemd: {{ radarr_service.status.ActiveState }}"
          - "Radarr HTTP: {{ radarr_endpoint.status }}"
